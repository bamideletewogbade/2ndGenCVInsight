services:
  - type: web
    name: cv-insight-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: NVIDIA_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false